# Stack: Redis (Chat SDK), BFF Fastify, Next.js — MongoDB via MongoDB Atlas (MONGODB_URI no .env da raiz).
#
# 1. Copie .env.example para .env e preencha MONGODB_URI (connection string do Atlas) e ENCRYPTION_MASTER_KEY
#    (64 caracteres hex para cifrar segredos por workspace; openssl rand -hex 32).
#
# Subir:  docker compose up --build
#
# Seed (dados demo + login admin@whitebeard.dev / Admin123!) — aponta para o mesmo Atlas:
#        docker compose --profile seed run --rm seed
#
# Produção (Coolify) — defaults no compose:
#   App: https://myteams.whitebeard.dev  (front host :3002 → Next :3002)
#   API: https://api.myteams.whitebeard.dev  (PUBLIC_API_BASE_URL + NEXT_PUBLIC_API_URL; TLS na 443 no proxy Coolify;
#        o BFF no contentor continua em HTTP na :3001.)
# Desenvolvimento local: sobrescreva no .env (ver .env.example).
#
# Coolify: variáveis como FRONTEND_PORT e PORT devem aparecer na UI se estiverem em `environment` com ${VAR:-default}
# (ver documentação Coolify — Docker Compose). Se alterar PORT no backend, o healthcheck usa o mesmo valor.
# Healthcheck do frontend usa 3002 dentro do container (FRONTEND_PORT mapeia só no host).
#
# JWT_SECRET: definir no Coolify em produção; o default abaixo é só para desenvolvimento.

name: agents-team-crafter

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:${PORT:-3001}"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      MONGODB_URI: ${MONGODB_URI:?Defina MONGODB_URI no ficheiro .env na raiz (MongoDB Atlas)}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?Defina ENCRYPTION_MASTER_KEY no .env na raiz (64 caracteres hex; openssl rand -hex 32)}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long-for-docker!!}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://myteams.whitebeard.dev,https://myteams.whitebeard.dev:3002}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}
      MEDIA_GALLERY_ROOT: /app/data/gallery
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://api.myteams.whitebeard.dev}
    volumes:
      - backend_gallery:/app/data/gallery
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+process.env.PORT+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./v0-team-ai-crafter
      dockerfile: Dockerfile
      args:
        ALLOW_LOCALHOST_API: ${ALLOW_LOCALHOST_API:-false}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://myteams.whitebeard.dev}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.myteams.whitebeard.dev/api/v1}
        NEXT_PUBLIC_ENABLE_VERCEL_ANALYTICS: ${NEXT_PUBLIC_ENABLE_VERCEL_ANALYTICS:-false}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      FRONTEND_PORT: ${FRONTEND_PORT:-3002}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://myteams.whitebeard.dev}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.myteams.whitebeard.dev/api/v1}
      NEXT_PUBLIC_ENABLE_VERCEL_ANALYTICS: ${NEXT_PUBLIC_ENABLE_VERCEL_ANALYTICS:-false}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  # Popula o Atlas (login demo). Requer MONGODB_URI no .env da raiz.
  seed:
    profiles: ["seed"]
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: ${MONGODB_URI:?Defina MONGODB_URI no ficheiro .env na raiz (MongoDB Atlas)}
    command: sh -c "npm ci && npx tsx scripts/seed.ts"

volumes:
  redis_data:
  backend_gallery:
